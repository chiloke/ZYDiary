<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#efe9df">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>ZY Diary · 往日复盘</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="review">
  <canvas id="dustCanvas" aria-hidden="true"></canvas>
  <div class="page-shell">
    <header class="topbar glass">
      <a class="brand" href="./index.html">
        <img class="brand-mark" src="./build/brand-logo.png" alt="ZY Diary logo">
        <span class="brand-text">ZY Diary</span>
      </a>
      <nav class="nav">
        <a class="nav-link" href="./index.html">总览</a>
        <a class="nav-link" href="./daily.html">记录</a>
        <a class="nav-link active" href="./review.html">复盘</a>
        <a class="nav-link" href="./goals.html">目标</a>
        <a class="nav-link" href="./ledger.html">账本</a>
        <a class="nav-link" href="./reports.html">报告</a>
        <a class="nav-link" href="./profile.html">档案</a>
        <a class="nav-link" href="./help.html">帮助</a>
      </nav>
    </header>

    <main class="content-grid">
      <section class="panel glass span-2">
        <div class="section-head">
          <div>
            <p class="section-tag">往日复盘</p>
            <h1 class="page-title">回看最近六条，也能按日历回到特定日期</h1>
          </div>
          <span class="section-hint">有记录的日期会以黑色数字显示，可点击查看；没有记录的日期会灰掉并不可选。</span>
        </div>
        <div class="review-history-layout">
          <article class="memory-card review-history-card">
            <div class="memory-head review-history-head">
              <div>
                <p class="memory-date">最近 6 条</p>
                <h3>复盘时间线</h3>
              </div>
              <span class="memory-tag" id="reviewHistoryCount">0 条记录</span>
            </div>
            <div class="review-history-list" id="reviewHistoryList"></div>
          </article>

          <div class="reflection-stack">
            <article class="memory-card">
              <div class="memory-head review-history-head">
                <div>
                  <p class="memory-date">选中记录</p>
                  <h3 id="reviewHistoryTitle">当前没有可展示的记录</h3>
                </div>
                <span class="memory-tag" id="reviewHistorySavedAt">未保存</span>
              </div>
              <div class="status-trace review-status-trace" id="reviewHistoryStatus"></div>
              <div class="summary-box review-review-box" id="reviewHistorySummary">这个日期还没有保存过复盘记录。请从每日记录页先写下一条正式记录。</div>
            </article>

            <article class="memory-card">
              <div class="memory-head review-history-head">
                <div>
                  <p class="memory-date">复盘日历</p>
                  <h3 id="reviewCalendarTitle">--</h3>
                </div>
                <div class="calendar-nav">
                  <button class="button ghost small" id="reviewPrevMonthButton" type="button">上月</button>
                  <button class="button ghost small" id="reviewNextMonthButton" type="button">下月</button>
                </div>
              </div>
              <div class="calendar-grid review-calendar-grid" id="reviewCalendarGrid"></div>
            </article>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
